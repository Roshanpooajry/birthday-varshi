<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Varshi</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ---------------- BODY ---------------- */
body{
  margin:0;
  font-family:'Poppins', Arial, sans-serif;
  background:linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:#f5f5f5;
  overflow-x:hidden;
  text-align:center;
}

/* ---------------- CINEMATIC INTRO ---------------- */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000000cc;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#intro h1{
  font-size:50px;
  font-weight:800;
  color:#ffdee9;
  text-shadow: 0 0 20px #ff4081, 0 0 40px #ff80ab;
  animation:fade 2s infinite alternate;
}
@keyframes fade{
  from{opacity:0.3} to{opacity:1}
}
#startBtn{
  padding:15px 50px;
  font-size:18px;
  border:none;
  background:linear-gradient(45deg,#ff4081,#ff80ab);
  color:white;
  font-weight:600;
  border-radius:12px;
  cursor:pointer;
  box-shadow: 0 0 15px #ff4081;
  transition:0.3s;
}
#startBtn:hover{
  transform:scale(1.1);
  box-shadow: 0 0 25px #ff80ab;
}

/* ---------------- MAIN ---------------- */
#main{
  display:none;
  padding:20px;
}

/* ---------------- TYPING MESSAGE ---------------- */
#typing{
  font-size:22px;
  width:90%;
  max-width:700px;
  margin:30px auto;
  line-height:1.6;
  color:#ffe0f0;
  text-shadow: 0 0 5px #ff80ab;
  font-family:'Roboto', sans-serif;
}

/* ---------------- FLOATING HEARTS ---------------- */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:24px;
  color:#ff4081;
  animation:float 6s linear infinite;
  text-shadow:0 0 10px #ff80ab;
}
@keyframes float{
  0%{transform:translateY(0)}
  100%{transform:translateY(-100vh)}
}

/* ---------------- 3D CAROUSEL ---------------- */
.carousel{
  position:relative;
  width:280px;
  height:280px;
  margin:60px auto;
  transform-style:preserve-3d;
  animation:rotate 25s infinite linear;
}
.carousel img{
  position:absolute;
  width:240px;
  height:240px;
  object-fit:cover;
  border-radius:12px;
  left:20px;
  top:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}
@keyframes rotate{
  from{transform:rotateY(0deg)}
  to{transform:rotateY(360deg)}
}

/* ---------------- GAME SECTION ---------------- */
#gameSection{
  margin-top:50px;
}
#gameTitle{
  font-size:26px;
  font-weight:700;
  color:#ffd700;
  text-shadow:0 0 10px #ff4081,0 0 20px #ff80ab;
  margin-bottom:10px;
}
#score{
  font-size:22px;
  font-weight:500;
  color:#ffe0f0;
  text-shadow:0 0 5px #ff80ab;
  margin-bottom:20px;
}
.fallingHeart{
  position:absolute;
  font-size:50px; /* bigger hearts */
  color:#ff4081;
  cursor:pointer;
  user-select:none;
  text-shadow:0 0 15px #ff80ab;
  transition:0.2s transform;
}
.fallingHeart:active{
  transform:scale(1.3);
}

/* ---------------- CONFETTI ---------------- */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  background:red;
  top:-10px;
  animation:fall 4s linear infinite;
  border-radius:50%;
}
@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg); }
}

/* ---------------- MOBILE RESPONSIVE ---------------- */
@media(max-width:600px){
  #intro h1{font-size:32px;}
  #startBtn{padding:12px 30px; font-size:16px;}
  .carousel{width:200px; height:200px;}
  .carousel img{width:170px; height:170px; left:15px; top:15px;}
  .fallingHeart{font-size:36px;}
}
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div id="intro">
  <h1>🎉CLICK TO OPEN 🐒🎉</h1>
  <button id="startBtn" onclick="start()">OPEN KARLO</button>
</div>

<!-- AUTO MUSIC -->
<audio id="music" src="music.mp3" loop></audio>

<!-- MAIN CONTENT -->
<div id="main">
  <h1 style="font-family:'Poppins', sans-serif; color:#ffd700; text-shadow:0 0 15px #ff4081;">🎂HAPPY BIRTHDAY VARSHI🎂</h1>
  <div id="typing"></div>

  <!-- 3D PHOTO CAROUSEL -->
  <div class="carousel" id="carousel">
    <img src="pic1.jpg" style="transform:rotateY(0deg) translateZ(350px);">
    <img src="pic2.jpg" style="transform:rotateY(90deg) translateZ(350px);">
    <img src="pic3.jpg" style="transform:rotateY(180deg) translateZ(350px);">
    <img src="pic4.jpg" style="transform:rotateY(270deg) translateZ(350px);">
    <img src="pic5.jpg" style="transform:rotateY(0deg) translateZ(350px);">
    <img src="pic6.jpg" style="transform:rotateY(90deg) translateZ(350px);">
    <img src="pic7.jpg" style="transform:rotateY(180deg) translateZ(350px);">
    <img src="pic8.jpg" style="transform:rotateY(270deg) translateZ(350px);">
  </div>

  <!-- GAME SECTION -->
  <div id="gameSection">
    <div id="gameTitle">💖 Catch the Falling Hearts!</div>
    <div id="score">Score: 0</div>
  </div>
</div>

<script>
function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("music").play();

  typingMessage();
  createHearts();
  createConfetti();
  startGame();
}

function typingMessage(){
  const text="Happy Birthday to the most amazing friend in my life. Every memory with you is special and every moment we share makes life brighter. May your life be filled with happiness, love, success and dreams that come true.";
  let i=0;
  let speed=40;
  function type(){
    if(i<text.length){
      document.getElementById("typing").innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,speed);
    }
  }
  type();
}

/* FLOATING HEARTS */
function createHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  },300)
}

/* CONFETTI */
function createConfetti(){
  setInterval(()=>{
    let conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background="hsl("+Math.random()*360+",100%,50%)";
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),4000);
  },120)
}

/* GAME */
let score = 0;
function startGame(){
  setInterval(()=>{
    const heart = document.createElement('div');
    heart.className = 'fallingHeart';
    heart.innerHTML = '❤';
    heart.style.left = Math.random() * (window.innerWidth - 50) + 'px';
    heart.style.top = '-50px';
    document.body.appendChild(heart);

    let fallSpeed = 2 + Math.random()*3;
    const fallInterval = setInterval(()=>{
      let top = parseFloat(heart.style.top);
      if(top > window.innerHeight){
        heart.remove();
        clearInterval(fallInterval);
      } else {
        heart.style.top = top + fallSpeed + 'px';
      }
    },20);

    heart.addEventListener('click', ()=>{
      score += 1;
      document.getElementById('score').innerText = 'Score: ' + score;
      heart.remove();
      clearInterval(fallInterval);
    });
  },1000);
}
</script>
</body>
</html>
